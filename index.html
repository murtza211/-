<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أور التعليمية - المطور مرتضى أيمن</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="light-mode">
    <div id="introScreen" class="intro-screen active">
        <div class="intro-container">
            <h1 class="logo-intro">🏛️ منصة أور</h1>
            <div class="typewriter-container">
                <p id="typewriter" class="typewriter"></p>
                <span class="cursor">|</span>
            </div>
            
            <div id="nameInputSection" class="name-input-section hidden">
                <input type="text" id="studentName" placeholder="أدخل اسمك..." class="name-input" autocomplete="off">
                <button onclick="saveName()" class="submit-name-btn">دخول للمنصة ➜</button>
            </div>

            <div id="stageSection" class="stage-section hidden">
                <p class="stage-label">اختر مرحلتك الدراسية في أور:</p>
                <div class="stage-options">
                    <button class="stage-btn" onclick="selectStage('elementary')">الابتدائية</button>
                    <button class="stage-btn" onclick="selectStage('middle')">المتوسطة</button>
                    <button class="stage-btn" onclick="selectStage('high')">الإعدادية</button>
                </div>
            </div>
        </div>
    </div>

    <div id="mainContent" class="main-content hidden">
        <header class="header">
            <div class="container header-container">
                <div class="user-info">
                    <div class="user-details">
                        <span id="userNameDisplay" class="user-name">..</span>
                        <span id="userStageDisplay" class="user-stage-badge">..</span>
                    </div>
                </div>
                <div class="header-actions">
                    <button onclick="toggleDarkMode()" id="themeToggle" class="btn btn-theme-toggle">🌓</button>
                </div>
            </div>
        </header>

        <main class="container">
            <section class="card">
                <h3>🔍 محرك بحث أور الذكي</h3>
                <div id="subjectsList" style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;"></div>
                <select id="teacherSelect" class="search-select" style="width: 100%; padding: 10px; margin-bottom: 10px;"></select>
                <input type="text" id="topicSearch" class="search-input" placeholder="اكتب الموضوع الدراسي..." style="width: 100%; padding: 10px; margin-bottom: 10px;">
                <button onclick="searchInYoutube()" class="btn-search" style="width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer;">بحث فيديو 🔍</button>
            </section>

            <section class="card">
                <h3>📝 مهام منصة أور اليومية</h3>
                <div id="tasksList"></div>
            </section>
        </main>

        <footer class="footer">
            <p>تم بناء "منصة أور" بواسطة المطور مرتضى أيمن &copy; 2026</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
